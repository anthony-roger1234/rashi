<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RASHI ARCHIVE</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1><span class="white">RASHI</span> <span class="yellow">ARCHIVE</span></h1>
  </header>

  <main>
    <!-- Album list -->
    <div id="album-list" class="album-list"></div>

    <!-- Pagination buttons -->
    <div id="pagination-controls"></div>

    <!-- Album view -->
    <div id="album-view" class="album-view hidden">
      <button id="back-btn">← Back</button>
      <h2 id="album-title"></h2>
      <div id="media-container" class="media-container"></div>
    </div>
  </main>

  <!-- Lightbox overlay -->
  <div id="lightbox-overlay">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="js/main.js"></script>
</body>
</html>
